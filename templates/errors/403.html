<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>403 — Forbidden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0f1117,#1a1d21);
         min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;}
    .box{text-align:center;padding:40px;}
    .icon{font-size:80px;color:#D4AF37;margin-bottom:20px;opacity:.9;}
    .code{font-size:120px;font-weight:900;color:#D4AF37;line-height:1;letter-spacing:-4px;}
    .title{font-size:24px;font-weight:800;margin:12px 0 8px;}
    .msg{color:#64748b;font-size:15px;margin-bottom:28px;}
    .btn{display:inline-flex;align-items:center;gap:8px;
         background:linear-gradient(135deg,#D4AF37,#A8892A);
         color:#0f1117;padding:11px 24px;border-radius:10px;
         font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;
         text-decoration:none;box-shadow:0 4px 14px rgba(212,175,55,.4);}
    .btn:hover{opacity:.9;}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="fas fa-ban"></i></div>
    <div class="code">403</div>
    <div class="title">Access Denied — غير مصرح</div>
    <div class="msg">You don't have permission to access this page.</div>
    <a href="/" class="btn"><i class="fas fa-home"></i> Go Home</a>
  </div>
</body>
</html>
